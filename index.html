<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Survival Flashcard & Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Animasi 3D Flip untuk Flashcard */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function HSKQuizApp() {
            // Master data nomor 76 sampai 150 (Total 75 kata)
            const allWords = [
                // Sesi 1: 76 - 100 (25 kata)
                ['号', 'hào', 'nomor, tanggal'], ['喝', 'hē', 'minum'], ['和', 'hé', 'dan, dengan'], ['很', 'hěn', 'sangat'], ['后', 'hòu', 'belakang'],
                ['回', 'huí', 'kembali'], ['会', 'huì', 'bisa'], ['火车', 'huǒ chē', 'kereta api'], ['鸡蛋', 'jī dàn', 'telur'], ['几', 'jǐ', 'berapa'],
                ['家', 'jiā', 'rumah'], ['家人', 'jiā rén', 'kekeluarga'], ['见', 'jiàn', 'bertemu'], ['件', 'jiàn', 'stel (baju)'], ['饺子', 'jiǎo zi', 'pansit'],
                ['叫', 'jiào', 'panggil'], ['姐姐', 'jiě jie', 'kakak (pr)'], ['今年', 'jīn nián', 'tahun ini'], ['今天', 'jīn tiān', 'hari ini'], ['九', 'jiǔ', 'sembilan'],
                ['觉得', 'jué de', 'merasakan'], ['开', 'kāi', 'buka'], ['开车', 'kāi chē', 'menyetir mobil'], ['看', 'kàn', 'melihat'], ['看病', 'kàn bìng', 'mengobati'],
                
                // Sesi 2: 101 - 125 (25 kata)
                ['看见', 'kàn jiàn', 'terlihat'], ['可以', 'kě yǐ', 'boleh'], ['课', 'kè', 'pelajaran'], ['口', 'kǒu', 'mulut'], ['块', 'kuài', 'sepotong (koin)'],
                ['来', 'lái', 'datang'], ['老师', 'lǎo shī', 'guru'], ['了', 'le', 'sudah'], ['冷', 'lěng', 'dingin'], ['里', 'lǐ', 'dalam'],
                ['两', 'liǎng', 'dua (barang)'], ['零', 'líng', 'nol'], ['六', 'liù', 'enam'], ['妈妈', 'mā ma', 'ibu'], ['吗', 'ma', 'apakah'],
                ['买', 'mǎi', 'beli'], ['卖', 'mài', 'jual'], ['忙', 'máng', 'sibuk'], ['猫', 'māo', 'kucing'], ['没关系', 'méi guān xi', 'tak apa apa'],
                ['没事', 'méi shì', 'tak masalah'], ['没有', 'méi yǒu', 'tidak ada'], ['妹妹', 'mèi mei', 'adik (pr)'], ['们', 'men', '(beberapa org)'], ['米饭', 'mǐ fàn', 'nasi putih'],
                
                // Sesi 3: 126 - 150 (25 kata)
                ['面包', 'miàn bāo', 'roti'], ['面条儿', 'miàn tiáor', 'mie'], ['明年', 'míng nián', 'tahun depan'], ['明天', 'míng tiān', 'besok'], ['名字', 'míng zi', 'nama'],
                ['哪', 'nǎ', 'mana'], ['哪个', 'nǎ gè', 'yang mana'], ['哪里', 'nǎ lǐ', 'dimana'], ['哪儿', 'nǎr', 'dimana'], ['哪些', 'nǎ xiē', 'yang mana'],
                ['那', 'nà', 'itu'], ['那边', 'nà biān', 'sana'], ['那个', 'nà gè', 'yang itu'], ['那里', 'nà lǐ', 'disana'], ['那儿', 'nàr', 'disana'],
                ['baggy / those', 'nà xiē', 'yang itu'], ['男', 'nán', 'pria'], ['男朋友', 'nán péng you', 'pacar pria'], ['呢', 'ne', 'kata bantu'], ['能', 'néng', 'bisa'],
                ['你', 'nǐ', 'kamu'], ['你好', 'nǐ hǎo', 'apakah kabar'], ['你们', 'nǐ men', 'kalian'], ['年', 'nián', 'tahun'], ['您', 'nín', 'anda']
            ];

            const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

            // State Manajemen Utama
            const [session, setSession] = useState('1'); 
            const [activeTab, setActiveTab] = useState('flashcard'); 
            const [currentWords, setCurrentWords] = useState([]);
            const [index, setIndex] = useState(0);
            
            // State Flashcard
            const [isFlipped, setIsFlipped] = useState(false);
            
            // State Kuis & Hardcore
            const [pinyinInput, setPinyinInput] = useState('');
            const [meaningInput, setMeaningInput] = useState('');
            const [score, setScore] = useState(0);
            const [showAnswerBlock, setShowAnswerBlock] = useState(false);
            const [quizFinished, setQuizFinished] = useState(false);
            const [wrongAnswers, setWrongAnswers] = useState([]);
            const [answeredList, setAnsweredList] = useState({});
            
            // State Timer
            const [quizGlobalTime, setQuizGlobalTime] = useState(1800); 
            const [perQuestionTime, setPerQuestionTime] = useState(15);
            const timerRef = useRef(null);

            // Filter Kata: Flashcard menggunakan Sesi, Quiz & Hardcore langsung DIGABUNG SEMUA
            useEffect(() => {
                if (activeTab === 'flashcard') {
                    let filtered = [];
                    if (session === '1') filtered = allWords.slice(0, 25);
                    else if (session === '2') filtered = allWords.slice(25, 50);
                    else if (session === '3') filtered = allWords.slice(50, 75);
                    else filtered = allWords;
                    setCurrentWords(filtered);
                } else {
                    // Otomatis gabung semua kosakata (76-150) untuk Kuis dan Hardcore
                    setCurrentWords(shuffle(allWords));
                }
                resetProgress();
            }, [session, activeTab]);

            // Kontrol Timer Otomatis
            useEffect(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                if (quizFinished) return;

                // 1. Timer Otomatis untuk Mode Quiz Biasa (30 Menit Global)
                if (activeTab === 'quiz' && currentWords.length > 0) {
                    timerRef.current = setInterval(() => {
                        setQuizGlobalTime((prev) => {
                            if (prev <= 1) {
                                clearInterval(timerRef.current);
                                setQuizFinished(true); 
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }

                // 2. Timer Otomatis untuk Mode Hardcore (15 Detik Per Soal)
                if (activeTab === 'hardcore' && !showAnswerBlock && currentWords.length > 0) {
                    setPerQuestionTime(15);
                    timerRef.current = setInterval(() => {
                        setPerQuestionTime((prev) => {
                            if (prev <= 1) {
                                clearInterval(timerRef.current);
                                handleHardcoreTimeout();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }

                return () => clearInterval(timerRef.current);
            }, [index, activeTab, quizFinished, showAnswerBlock, currentWords]);

            const formatGlobalTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${String(secs).padStart(2, '0')}`;
            };

            const playAudio = (text, e) => {
                if (e) e.stopPropagation(); 
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 0.85; 
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("Browser kamu tidak mendukung fitur audio.");
                }
            };

            const resetProgress = () => {
                setIndex(0);
                setIsFlipped(false);
                setPinyinInput('');
                setMeaningInput('');
                setScore(0);
                setShowAnswerBlock(false);
                setQuizFinished(false);
                setWrongAnswers([]);
                setAnsweredList({});
                setQuizGlobalTime(1800); 
                setPerQuestionTime(15);  
                if (timerRef.current) clearInterval(timerRef.current);
            };

            const normalize = (text) =>
                text.toLowerCase()
                    .trim()
                    .replace(/[âáǎà]/g, 'a')
                    .replace(/[êéěè]/g, 'e')
                    .replace(/[îíǐì]/g, 'i')
                    .replace(/[ôóǒò]/g, 'o')
                    .replace(/[ûúǔù]/g, 'u');

            const currentWord = currentWords[index] || ['-', '-', '-'];

            const processAnswer = () => {
                if (activeTab === 'hardcore') {
                    clearInterval(timerRef.current);
                }
                let point = 0;
                const correctPinyin = currentWord[1];
                const correctMeaning = currentWord[2];

                if (normalize(pinyinInput) === normalize(correctPinyin) && pinyinInput.trim() !== '') point += 1;
                if (correctMeaning.toLowerCase().includes(meaningInput.toLowerCase().trim()) && meaningInput.trim() !== '') point += 1;

                setScore((prev) => prev + point);

                if (point < 2) {
                    setWrongAnswers((prev) => [...prev, { hanzi: currentWord[0], pinyin: correctPinyin, meaning: correctMeaning }]);
                }

                setAnsweredList((prev) => ({
                    ...prev,
                    [index]: { pinyin: correctPinyin, meaning: correctMeaning, status: point === 2 ? 'PAS' : 'FAIL' }
                }));
                setShowAnswerBlock(true);
            };

            const handleHardcoreTimeout = () => {
                setWrongAnswers((prev) => [...prev, { hanzi: currentWord[0], pinyin: currentWord[1], meaning: currentWord[2] }]);
                setAnsweredList((prev) => ({
                    ...prev,
                    [index]: { pinyin: currentWord[1], meaning: currentWord[2], status: 'TIMEOUT' }
                }));
                setShowAnswerBlock(true);
            };

            const handleNext = () => {
                setIsFlipped(false);
                setShowAnswerBlock(false);
                setPinyinInput('');
                setMeaningInput('');

                if (index + 1 >= currentWords.length) {
                    setQuizFinished(true);
                } else {
                    setIndex((prev) => prev + 1);
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-6">
                    {/* Header Utama */}
                    <div className="text-center my-6">
                        <h1 className="text-4xl font-extrabold text-slate-800 tracking-tight">HSK 1 Pro Memorizer</h1>
                        <p className="text-slate-500 mt-2">Kuasai kosakata nomor 76 sampai 150 secara sistematis</p>
                    </div>

                    {/* Kontrol Navigasi & Sesi */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div className="flex flex-col gap-1 w-full sm:w-auto">
                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">
                                {activeTab === 'flashcard' ? 'Pilih Blok Belajar Flashcard' : 'Mode Ujian (Semua Kata Digabung)'}
                            </label>
                            <div className="flex flex-wrap gap-2 mt-1">
                                {activeTab === 'flashcard' ? (
                                    [
                                        { id: '1', label: 'Sesi 1 (76-100)' },
                                        { id: '2', label: 'Sesi 2 (101-125)' },
                                        { id: '3', label: 'Sesi 3 (126-150)' },
                                        { id: 'all', label: 'Semua (76-150)' }
                                    ].map((b) => (
                                        <button 
                                            key={b.id} 
                                            onClick={() => setSession(b.id)}
                                            className={`px-3 py-1.5 text-sm font-semibold rounded-xl transition ${session === b.id ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                        >
                                            {b.label}
                                        </button>
                                    ))
                                ) : (
                                    <span className="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-xl border border-indigo-100">
                                        ✨ Total 75 Kata (76-150) Aktif
                                    </span>
                                )}
                            </div>
                        </div>

                        {/* Pilihan Mode Navigasi */}
                        <div className="flex bg-slate-100 p-1 rounded-xl w-full sm:w-auto justify-center">
                            {[
                                { id: 'flashcard', label: '🃏 Flashcard' },
                                { id: 'quiz', label: '📝 Kuis Mode' },
                                { id: 'hardcore', label: '💀 Hardcore (15s)' }
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-4 py-2 text-sm font-bold rounded-lg transition ${activeTab === tab.id ? 'bg-white text-slate-800 shadow-xs' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Rangkaian Konten Utama */}
                    {currentWords.length > 0 && !quizFinished ? (
                        <div className="flex flex-col items-center">
                            
                            {/* Progres Indikator */}
                            <div className="w-full max-w-xl text-right text-xs text-slate-400 font-bold mb-2">
                                PROGRESS: {index + 1} / {currentWords.length} KATA
                            </div>

                            {/* --- MODE 1: FLASHCARD --- */}
                            {activeTab === 'flashcard' && (
                                <div className="w-full max-w-xl flex flex-col items-center gap-6">
                                    <div 
                                        onClick={() => setIsFlipped(!isFlipped)}
                                        className="w-full h-80 perspective-1000 cursor-pointer"
                                    >
                                        <div className={`w-full h-full duration-500 transform-style-3d relative rounded-3xl shadow-md border border-slate-200 ${isFlipped ? 'rotate-y-180' : ''}`}>
                                            <div className="absolute inset-0 w-full h-full bg-white rounded-3xl backface-hidden flex flex-col items-center justify-center p-6">
                                                <h2 className="text-8xl font-bold text-slate-800 tracking-wide select-none">{currentWord[0]}</h2>
                                                <p className="text-xs text-slate-300 mt-6 font-semibold uppercase tracking-widest">Klik kartu untuk melihat arti</p>
                                            </div>
                                            <div className="absolute inset-0 w-full h-full bg-indigo-500 text-white rounded-3xl rotate-y-180 backface-hidden flex flex-col items-center justify-center p-6 text-center">
                                                <span className="text-xs font-bold uppercase tracking-widest text-indigo-200">PINYIN & NADA</span>
                                                <h3 className="text-4xl font-bold mt-1 mb-4 tracking-wide">{currentWord[1]}</h3>
                                                <span className="text-xs font-bold uppercase tracking-widest text-indigo-200">ARTI INDONESIA</span>
                                                <p className="text-2xl font-medium mt-1 px-4">{currentWord[2]}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 w-full">
                                        <button 
                                            onClick={(e) => playAudio(currentWord[0], e)} 
                                            className="flex-1 bg-amber-500 text-white py-3 px-6 rounded-2xl font-bold shadow-md hover:bg-amber-600 transition flex items-center justify-center gap-2 text-lg"
                                        >
                                            🔊 Dengar Suara Mandarin
                                        </button>
                                        <button 
                                            onClick={handleNext}
                                            className="bg-slate-800 text-white py-3 px-8 rounded-2xl font-bold hover:bg-slate-900 transition text-lg"
                                        >
                                            Lanjut ➔
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* --- MODE 2 & 3: QUIZ & HARDCORE --- */}
                            {(activeTab === 'quiz' || activeTab === 'hardcore') && (
                                <div className="w-full max-w-xl bg-white rounded-3xl shadow-md border border-slate-200 p-6 sm:p-8">
                                    
                                    {activeTab === 'quiz' && (
                                        <div className={`w-full mb-4 py-2 px-4 rounded-xl font-black text-center text-lg tracking-wider bg-blue-100 text-blue-700 ${quizGlobalTime <= 60 ? 'bg-red-100 text-red-600 animate-pulse' : ''}`}>
                                            ⏱️ SISA WAKTU KUIS: {formatGlobalTime(quizGlobalTime)}
                                        </div>
                                    )}

                                    {activeTab === 'hardcore' && (
                                        <div className={`w-full mb-4 py-2 px-4 rounded-xl font-black text-center text-lg tracking-wider transition-colors duration-300 ${perQuestionTime <= 5 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-purple-100 text-purple-700'}`}>
                                            ⏰ SISA WAKTU SOAL: {perQuestionTime} DETIK
                                        </div>
                                    )}

                                    <div className="text-center mb-6">
                                        <h2 className="text-7xl font-black text-slate-800 my-4">{currentWord[0]}</h2>
                                        <button 
                                            onClick={(e) => playAudio(currentWord[0], e)}
                                            className="text-xs font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full hover:bg-slate-200 transition inline-flex items-center gap-1"
                                        >
                                            🔊 Bantuan Suara
                                        </button>
                                    </div>

                                    {showAnswerBlock && (
                                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-4 text-sm">
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Kunci Jawaban Asli:</p>
                                            <p className="text-slate-700"><strong>Pinyin:</strong> <span className="text-indigo-600 font-mono font-bold">{currentWord[1]}</span></p>
                                            <p className="text-slate-700"><strong>Arti:</strong> <span className="text-emerald-600 font-bold">{currentWord[2]}</span></p>
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Pinyin (Boleh tanpa tanda nada):</label>
                                            <input
                                                type="text"
                                                value={pinyinInput}
                                                disabled={showAnswerBlock}
                                                onChange={(e) => setPinyinInput(e.target.value)}
                                                placeholder="Contoh: hao / jiaozi"
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition font-mono disabled:opacity-60"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Arti Bahasa Indonesia:</label>
                                            <input
                                                type="text"
                                                value={meaningInput}
                                                disabled={showAnswerBlock}
                                                onChange={(e) => setMeaningInput(e.target.value)}
                                                placeholder="Masukkan tebakan arti..."
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition disabled:opacity-60"
                                            />
                                        </div>

                                        <div className="pt-2">
                                            {!showAnswerBlock ? (
                                                <button
                                                    onClick={processAnswer}
                                                    className="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition"
                                                >
                                                    Kirim Jawaban
                                                </button>
                                            ) : (
                                                <button
                                                    onClick={handleNext}
                                                    className="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-emerald-700 transition"
                                                >
                                                    {index + 1 >= currentWords.length ? 'Lihat Hasil Akhir 🎉' : 'Soal Berikutnya ➔'}
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    ) : (
                        /* --- HALAMAN EVALUASI SKOR AKHIR --- */
                        <div className="w-full max-w-xl mx-auto bg-white rounded-3xl shadow-md border border-slate-200 p-8 text-center animate-scale-up">
                            <span className="text-5xl">🏆</span>
                            <h2 className="text-3xl font-black text-slate-800 mt-2 mb-1">Sesi Ujian Selesai!</h2>
                            <p className="text-slate-400 text-sm mb-6">Mode: {activeTab === 'quiz' ? 'Kuis Biasa (30 Menit)' : 'Hardcore Blitz'}</p>

                            <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 mb-6">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1">Skor Total Kamu</span>
                                <h3 className="text-6xl font-black text-indigo-600">{currentWords.length > 0 ? Math.round((score / (currentWords.length * 2)) * 100) : 0} <span className="text-2xl text-slate-400">/ 100</span></h3>
                                <p className="text-xs text-slate-400 mt-2">Dihitung dari ketepatan pinyin dan arti bahasa Indonesia.</p>
                            </div>

                            <button
                                onClick={resetProgress}
                                className="w-full bg-slate-800 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-slate-900 transition mb-6"
                            >
                                Ulangi Sesi Belajar Ini
                            </button>

                            {wrongAnswers.length > 0 && (
                                <div className="text-left border-t border-slate-100 pt-6">
                                    <h4 className="font-extrabold text-red-500 text-lg mb-3 flex items-center gap-1">❌ List Kata Yang Masih Lemah ({wrongAnswers.length})</h4>
                                    <div className="grid grid-cols-1 gap-2 max-h-60 overflow-y-auto pr-1">
                                        {wrongAnswers.map((item, i) => (
                                            <div key={i} className="bg-red-50/50 border border-red-100 rounded-xl p-3 flex items-center justify-between">
                                                <div>
                                                    <span className="text-2xl font-bold text-slate-800">{item.hanzi}</span>
                                                    <span className="ml-3 font-mono text-sm text-indigo-600 bg-white px-2 py-0.5 rounded border border-slate-200">{item.pinyin}</span>
                                                </div>
                                                <span className="text-sm font-semibold text-slate-600">{item.meaning}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(() => <HSKQuizApp />);
    </script>
</body>
</html>
