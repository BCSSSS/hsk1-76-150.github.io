<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HSK Survival Quiz & Flashcard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }

        .perspective { perspective: 1200px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface { backface-visibility: hidden; }
        .flip { transform: rotateY(180deg); }

        @keyframes shake {
            0%,100%{transform:translateX(0)} 15%{transform:translateX(-10px)}
            30%{transform:translateX(10px)} 45%{transform:translateX(-8px)}
            60%{transform:translateX(8px)} 75%{transform:translateX(-4px)} 90%{transform:translateX(4px)}
        }
        @keyframes pop-in {
            0%{transform:scale(0.85);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1}
        }
        @keyframes slide-up {
            0%{transform:translateY(18px);opacity:0} 100%{transform:translateY(0);opacity:1}
        }
        @keyframes blink {
            0%,100%{opacity:1} 50%{opacity:0.35}
        }
        @keyframes bar-shrink {
            from{width:100%} to{width:0%}
        }
        @keyframes heart-pop {
            0%{transform:scale(1)} 40%{transform:scale(1.5)} 100%{transform:scale(1)}
        }
        .shake { animation: shake 0.45s ease; }
        .pop-in { animation: pop-in 0.3s ease forwards; }
        .slide-up { animation: slide-up 0.35s ease forwards; }
        .blink { animation: blink 0.75s ease infinite; }
        .heart-pop { animation: heart-pop 0.4s ease; }

        .timer-bar {
            animation: bar-shrink linear forwards;
        }

        .glass {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card-glow { box-shadow: 0 0 0 1px rgba(99,102,241,0.08), 0 8px 32px rgba(99,102,241,0.10); }
        .hc-glow { box-shadow: 0 0 0 1px rgba(220,38,38,0.10), 0 8px 32px rgba(220,38,38,0.12); }

        input[type=text] { -webkit-appearance: none; appearance: none; }
        body { background: linear-gradient(135deg, #eef2ff 0%, #f0fdf4 50%, #fdf4ff 100%); min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ══════════════════════════════════════════
        //   DATA NO. 76–150 (hào → nín) sesuai buku
        // ══════════════════════════════════════════
        const WORDS = [
            ['号','hào','nomor, tanggal'],
            ['喝','hē','minum'],
            ['和','hé','dan, dengan'],
            ['很','hěn','sangat'],
            ['后','hòu','belakang'],
            ['回','huí','kembali'],
            ['会','huì','bisa'],
            ['火车','huǒ chē','kereta api'],
            ['鸡蛋','jī dàn','telur'],
            ['几','jǐ','berapa'],
            ['家','jiā','rumah'],
            ['家人','jiā rén','kekeluarga'],
            ['见','jiàn','bertemu'],
            ['件','jiàn','stel (baju)'],
            ['饺子','jiǎo zi','pansit'],
            ['叫','jiào','dipanggil'],
            ['姐姐','jiě jie','kakak (pr)'],
            ['今年','jīn nián','tahun ini'],
            ['今天','jīn tiān','hari ini'],
            ['九','jiǔ','sembilan'],
            ['觉得','jué de','merasakan'],
            ['开','kāi','buka'],
            ['开车','kāi chē','menyetir mobil'],
            ['看','kàn','melihat'],
            ['看病','kàn bìng','mengobati'],
            ['看见','kàn jiàn','terlihat'],
            ['可以','kě yǐ','boleh'],
            ['课','kè','pelajaran'],
            ['口','kǒu','mulut'],
            ['块','kuài','sepotong (koin)'],
            ['来','lái','datang'],
            ['老师','lǎo shī','guru'],
            ['了','le','sudah'],
            ['冷','lěng','dingin'],
            ['里','lǐ','dalam'],
            ['两','liǎng','dua (barang)'],
            ['零','líng','nol'],
            ['六','liù','enam'],
            ['妈妈','mā ma','ibu'],
            ['吗','ma','apakah'],
            ['买','mǎi','beli'],
            ['卖','mài','jual'],
            ['忙','máng','sibuk'],
            ['猫','māo','kucing'],
            ['没关系','méi guān xi','tak apa apa'],
            ['没事','méi shì','tak masalah'],
            ['没有','méi yǒu','tidak ada'],
            ['妹妹','mèi mei','adik (pr)'],
            ['们','men','(beberapa org)'],
            ['米饭','mǐ fàn','nasi putih'],
            ['面包','miàn bāo','roti'],
            ['面条儿','miàn tiáor','mie'],
            ['明年','míng nián','tahun depan'],
            ['明天','míng tiān','besok'],
            ['名字','míng zi','nama'],
            ['哪','nǎ','mana'],
            ['哪个','nǎ gè','yang mana'],
            ['哪里','nǎ lǐ','dimana'],
            ['哪儿','nǎr','dimana'],
            ['哪些','nǎ xiē','yang mana (jamak)'],
            ['那','nà','itu'],
            ['那边','nà biān','sana'],
            ['那个','nà gè','yang itu'],
            ['那里','nà lǐ','disana'],
            ['那儿','nàr','disana'],
            ['那些','nà xiē','yang itu (jamak)'],
            ['男','nán','pria'],
            ['男朋友','nán péng you','pacar pria'],
            ['呢','ne','kata bantu'],
            ['能','néng','bisa'],
            ['你','nǐ','kamu'],
            ['你好','nǐ hǎo','halo / apa kabar'],
            ['你们','nǐ men','kalian'],
            ['年','nián','tahun'],
            ['您','nín','anda (sopan)'],
        ];

        const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

        // ── Konversi â î ô û ê → nada 3 ──
        const cvtMobile = (t) => t
            .replace(/â/g,'ǎ').replace(/î/g,'ǐ').replace(/ô/g,'ǒ').replace(/û/g,'ǔ').replace(/ê/g,'ě')
            .replace(/Â/g,'Ǎ').replace(/Î/g,'Ǐ').replace(/Ô/g,'Ǒ').replace(/Û/g,'Ǔ').replace(/Ê/g,'Ě');

        // ── Normalisasi pinyin TEPAT nada (hanya strip spasi & huruf besar) ──
        const normPinyin = (t) => cvtMobile(t.trim().toLowerCase().replace(/\s+/g,' '));

        // ── Normalisasi arti (ignore nada, case, spasi) ──
        const normMeaning = (t) => t.toLowerCase().trim()
            .replace(/[áǎàā]/g,'a').replace(/[éěèē]/g,'e')
            .replace(/[íǐìī]/g,'i').replace(/[óǒòō]/g,'o').replace(/[úǔùū]/g,'u');


        // ══════════════════════════════════════════
        //   KOMPONEN UTAMA
        // ══════════════════════════════════════════
        function App() {
            const [mode, setMode] = useState('flashcard');
            const [session, setSession] = useState(0);
            return (
                <div style={{minHeight:'100vh', padding:'16px 12px 48px'}}>
                    <div style={{maxWidth:480,margin:'0 auto'}}>
                        {/* ── HEADER ── */}
                        <div style={{textAlign:'center',marginBottom:24}}>
                            <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.6)',backdropFilter:'blur(12px)',border:'1px solid rgba(99,102,241,0.15)',borderRadius:999,padding:'6px 18px',marginBottom:12}}>
                                <span style={{fontSize:18}}>🈶</span>
                                <span style={{fontSize:12,fontWeight:800,letterSpacing:2,color:'#6366f1',textTransform:'uppercase'}}>HSK Survival</span>
                            </div>
                            <h1 style={{fontSize:28,fontWeight:900,color:'#1e1b4b',margin:0,lineHeight:1.1}}>Quiz & Flashcard</h1>
                            <p style={{fontSize:13,color:'#818cf8',fontWeight:600,margin:'4px 0 0'}}>No. 76 – 150 · Mandarin × Indonesia</p>
                        </div>

                        {/* ── TAB ── */}
                        <div style={{display:'flex',gap:6,background:'rgba(255,255,255,0.55)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.8)',borderRadius:20,padding:6,marginBottom:20,boxShadow:'0 2px 16px rgba(99,102,241,0.08)'}}>
                            {[
                                ['flashcard','🃏','Flashcard','#6366f1'],
                                ['quiz','📝','Quiz','#059669'],
                                ['hardcore','💀','Hardcore','#dc2626'],
                            ].map(([m, icon, label, color]) => (
                                <button key={m} onClick={() => setMode(m)} style={{
                                    flex:1, padding:'10px 4px', border:'none', cursor:'pointer',
                                    borderRadius:14, fontWeight:800, fontSize:12, transition:'all 0.2s',
                                    background: mode===m ? color : 'transparent',
                                    color: mode===m ? '#fff' : '#64748b',
                                    boxShadow: mode===m ? `0 4px 12px ${color}44` : 'none',
                                    display:'flex', flexDirection:'column', alignItems:'center', gap:2,
                                }}>
                                    <span style={{fontSize:18}}>{icon}</span>
                                    {label}
                                </button>
                            ))}
                        </div>

                        {/* ── KONTEN ── */}
                        {mode === 'flashcard' && <Flashcard session={session} setSession={setSession} />}
                        {mode === 'quiz' && <QuizMode />}
                        {mode === 'hardcore' && <HardcoreMode />}
                    </div>
                </div>
            );
        }

        // ══════════════════════════════════════════
        //   FLASHCARD
        // ══════════════════════════════════════════
        function Flashcard({ session, setSession }) {
            const [isShuffled, setIsShuffled] = useState(false);
            const [shuffledList, setShuffledList] = useState([]);

            const getBase = (s) => {
                const third = Math.ceil(WORDS.length / 3);
                if (s === 0) return WORDS;
                if (s === 1) return WORDS.slice(0, third);
                if (s === 2) return WORDS.slice(third, third * 2);
                return WORDS.slice(third * 2);
            };

            const list = isShuffled ? shuffledList : getBase(session);
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [done, setDone] = useState(false);

            useEffect(() => { setIdx(0); setFlipped(false); setDone(false); }, [session, isShuffled]);

            const toggleShuffle = () => {
                const newShuffled = shuffle([...getBase(session)]);
                setShuffledList(newShuffled);
                setIsShuffled(p => !p);
            };

            const cur = list[idx] || WORDS[0];
            const progress = ((idx + 1) / list.length) * 100;

            if (done) return (
                <Card>
                    <div style={{textAlign:'center',padding:'24px 0'}}>
                        <div style={{fontSize:56,marginBottom:8}}>🎉</div>
                        <h2 style={{fontSize:22,fontWeight:900,color:'#1e1b4b',margin:'0 0 4px'}}>Sesi Selesai!</h2>
                        <p style={{color:'#94a3b8',fontSize:13,marginBottom:24}}>Semua {list.length} kartu sudah ditinjau</p>
                        <Btn color="#6366f1" onClick={() => { setIdx(0); setFlipped(false); setDone(false); }}>Ulangi Sesi</Btn>
                    </div>
                </Card>
            );

            return (
                <>
                {/* Sesi selector + shuffle */}
                <div style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:2,textTransform:'uppercase',margin:0}}>Sesi Belajar</p>
                        <button onClick={toggleShuffle} style={{
                            display:'flex', alignItems:'center', gap:5,
                            background: isShuffled ? '#6366f1' : 'rgba(255,255,255,0.6)',
                            border: `1px solid ${isShuffled ? '#6366f1' : 'rgba(99,102,241,0.2)'}`,
                            borderRadius:10, padding:'5px 10px', cursor:'pointer',
                            fontSize:11, fontWeight:800,
                            color: isShuffled ? '#fff' : '#818cf8',
                            transition:'all 0.2s',
                        }}>
                            🔀 {isShuffled ? 'Diacak' : 'Urut'}
                        </button>
                    </div>
                    <div style={{display:'flex',gap:5,background:'rgba(255,255,255,0.5)',border:'1px solid rgba(99,102,241,0.12)',borderRadius:14,padding:5}}>
                        {[['Semua',0],['Sesi 1',1],['Sesi 2',2],['Sesi 3',3]].map(([l,s]) => (
                            <button key={s} onClick={() => setSession(s)} style={{
                                flex:1, padding:'7px 0', border:'none', cursor:'pointer', borderRadius:10,
                                fontWeight:800, fontSize:11,
                                background: session===s ? '#6366f1' : 'transparent',
                                color: session===s ? '#fff' : '#818cf8',
                                boxShadow: session===s ? '0 2px 8px #6366f144' : 'none',
                                transition:'all 0.18s',
                            }}>{l}</button>
                        ))}
                    </div>
                </div>

                <Card>
                    {/* Progress */}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                        <span style={{fontSize:11,fontWeight:700,color:'#c7d2fe',letterSpacing:2,textTransform:'uppercase'}}>Kartu</span>
                        <span style={{fontSize:12,fontWeight:800,color:'#6366f1'}}>{idx+1} / {list.length}</span>
                    </div>
                    <div style={{height:4,background:'#eef2ff',borderRadius:99,marginBottom:24,overflow:'hidden'}}>
                        <div style={{height:'100%',borderRadius:99,background:'linear-gradient(90deg,#6366f1,#a78bfa)',width:`${progress}%`,transition:'width 0.4s ease'}} />
                    </div>

                    {/* Kartu flip */}
                    <div onClick={() => setFlipped(!flipped)} style={{cursor:'pointer',perspective:1200,height:220,marginBottom:24}}>
                        <div style={{
                            width:'100%', height:'100%', position:'relative',
                            transformStyle:'preserve-3d', transition:'transform 0.5s cubic-bezier(.4,0,.2,1)',
                            transform: flipped ? 'rotateY(180deg)' : 'rotateY(0)',
                        }}>
                            {/* Depan */}
                            <div style={{
                                position:'absolute', inset:0, backfaceVisibility:'hidden',
                                background:'linear-gradient(135deg,#f0f4ff 0%,#fafbff 100%)',
                                borderRadius:20, border:'1px solid rgba(99,102,241,0.12)',
                                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                                boxShadow:'0 4px 24px rgba(99,102,241,0.08)',
                            }}>
                                <div style={{fontSize:72,fontWeight:900,color:'#1e1b4b',lineHeight:1,marginBottom:12}}>{cur[0]}</div>
                                <div style={{fontSize:11,fontWeight:700,color:'#c7d2fe',letterSpacing:2,textTransform:'uppercase'}}>TAP UNTUK MELIHAT ARTI</div>
                            </div>
                            {/* Belakang */}
                            <div style={{
                                position:'absolute', inset:0, backfaceVisibility:'hidden',
                                background:'linear-gradient(135deg,#6366f1 0%,#4f46e5 100%)',
                                borderRadius:20, transform:'rotateY(180deg)',
                                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                                boxShadow:'0 4px 24px rgba(99,102,241,0.25)',
                                padding:24, textAlign:'center',
                            }}>
                                <div style={{fontSize:11,fontWeight:700,color:'#a5b4fc',letterSpacing:2,textTransform:'uppercase',marginBottom:2}}>PINYIN</div>
                                <div style={{fontSize:28,fontWeight:900,color:'#fff',fontFamily:'monospace',marginBottom:16}}>{cur[1]}</div>
                                <div style={{fontSize:11,fontWeight:700,color:'#a5b4fc',letterSpacing:2,textTransform:'uppercase',marginBottom:2}}>ARTI</div>
                                <div style={{fontSize:22,fontWeight:800,color:'#a7f3d0'}}>{cur[2]}</div>
                            </div>
                        </div>
                    </div>

                    {/* Navigasi */}
                    <div style={{display:'flex',gap:10}}>
                        <button onClick={() => { setFlipped(false); setIdx(p => Math.max(0, p-1)); }} disabled={idx===0} style={{
                            flex:'0 0 auto', padding:'14px 18px', border:'1px solid #e0e7ff',
                            background:'#f5f7ff', borderRadius:14, fontWeight:700, fontSize:14,
                            color: idx===0 ? '#c7d2fe' : '#6366f1', cursor: idx===0 ? 'default' : 'pointer',
                            transition:'all 0.18s',
                        }}>◀</button>
                        <button onClick={() => {
                            setFlipped(false);
                            if (idx + 1 >= list.length) setDone(true);
                            else setIdx(p => p + 1);
                        }} style={{
                            flex:1, padding:'14px', border:'none', cursor:'pointer',
                            background:'linear-gradient(135deg,#6366f1,#4f46e5)',
                            borderRadius:14, fontWeight:800, fontSize:14, color:'#fff',
                            boxShadow:'0 4px 16px rgba(99,102,241,0.35)', transition:'all 0.18s',
                        }}>
                            {idx+1 >= list.length ? '🎉 Selesai' : 'Kartu Berikutnya ➔'}
                        </button>
                    </div>
                </Card>
                </>
            );
        }

        // ══════════════════════════════════════════
        //   QUIZ MODE (timer 30 menit, nada ketat)
        // ══════════════════════════════════════════
        function QuizMode() {
            const [isShuffled, setIsShuffled] = useState(false);
            const [list, setList] = useState(WORDS);
            const [idx, setIdx] = useState(0);
            const [pinyin, setPinyin] = useState('');
            const [meaning, setMeaning] = useState('');
            const [score, setScore] = useState(0);
            const [answered, setAnswered] = useState({});
            const [wrongList, setWrongList] = useState([]);
            const [showResult, setShowResult] = useState(false);
            const [finished, setFinished] = useState(false);
            const [timeLeft, setTimeLeft] = useState(1800);
            const [started, setStarted] = useState(false);
            const [flash, setFlash] = useState(null); // 'correct' | 'wrong'
            const inputRef = useRef(null);

            useEffect(() => {
                if (!started || finished || timeLeft <= 0) {
                    if (timeLeft <= 0) setFinished(true);
                    return;
                }
                const t = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(t);
            }, [started, finished, timeLeft]);

            const cur = list[idx] || WORDS[0];
            const danger = timeLeft <= 300;
            const fmtTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
            const progress = ((idx) / list.length) * 100;
            const maxScore = list.length * 2;

            const checkAnswer = () => {
                if (!started) setStarted(true);
                if (showResult) return;
                let earned = 0;
                // Pinyin: HARUS tepat nada (setelah konversi mobile)
                const userP = normPinyin(pinyin);
                const correctP = normPinyin(cur[1]);
                const pinyinOk = userP === correctP;
                if (pinyin.trim() !== '' && pinyinOk) earned++;

                // Arti: agak fleksibel (ignore nada vokal, case)
                const meaningOk = meaning.trim() !== '' && (
                    normMeaning(cur[2]).includes(normMeaning(meaning)) ||
                    normMeaning(meaning).includes(normMeaning(cur[2]))
                );
                if (meaningOk) earned++;

                setScore(p => p + earned);
                const allCorrect = pinyinOk && meaningOk;
                setFlash(allCorrect ? 'correct' : 'wrong');
                setTimeout(() => setFlash(null), 600);
                if (!allCorrect) setWrongList(p => [...p, { hanzi: cur[0], pinyin: cur[1], meaning: cur[2] }]);
                setAnswered(p => ({ ...p, [idx]: { pinyin: cur[1], meaning: cur[2], pinyinOk, meaningOk } }));
                setShowResult(true);
            };

            const nextQ = () => {
                setShowResult(false); setPinyin(''); setMeaning('');
                if (idx + 1 >= list.length) setFinished(true);
                else { setIdx(p => p + 1); setTimeout(() => inputRef.current?.focus(), 50); }
            };

            const toggleShuffle = () => {
                const newList = !isShuffled ? shuffle([...WORDS]) : WORDS;
                setList(newList);
                setIsShuffled(p => !p);
                setIdx(0); setPinyin(''); setMeaning(''); setScore(0);
                setAnswered({}); setWrongList([]); setShowResult(false);
                setFinished(false); setTimeLeft(1800); setStarted(false);
            };

            const finalScore = Math.round((score / maxScore) * 100);

            if (finished) return (
                <FinishScreen score={finalScore} label="Quiz" color="#059669"
                    extra={started ? `Sisa waktu: ${fmtTime(timeLeft)}` : ''}
                    wrongList={wrongList} onRetry={() => {
                        const newList = isShuffled ? shuffle([...WORDS]) : WORDS;
                        setList(newList);
                        setIdx(0); setPinyin(''); setMeaning(''); setScore(0);
                        setAnswered({}); setWrongList([]); setShowResult(false);
                        setFinished(false); setTimeLeft(1800); setStarted(false);
                    }} />
            );

            return (
                <>
                {/* Shuffle + Timer row */}
                <div style={{display:'flex',gap:8,marginBottom:14}}>
                    {/* Shuffle toggle */}
                    <button onClick={toggleShuffle} style={{
                        display:'flex', alignItems:'center', gap:5, flexShrink:0,
                        background: isShuffled ? '#059669' : 'rgba(255,255,255,0.7)',
                        border: `1px solid ${isShuffled ? '#059669' : 'rgba(16,185,129,0.25)'}`,
                        borderRadius:12, padding:'10px 12px', cursor:'pointer',
                        fontSize:11, fontWeight:800,
                        color: isShuffled ? '#fff' : '#059669',
                        backdropFilter:'blur(8px)', transition:'all 0.2s',
                        boxShadow: isShuffled ? '0 2px 8px #05996944' : 'none',
                    }}>
                        🔀 {isShuffled ? 'Diacak' : 'Urut'}
                    </button>

                    {/* Timer */}
                    <div style={{
                        flex:1, display:'flex', alignItems:'center', justifyContent:'space-between',
                        background: danger ? 'rgba(254,226,226,0.8)' : 'rgba(236,253,245,0.8)',
                        border: `1px solid ${danger ? '#fca5a5' : '#a7f3d0'}`,
                        borderRadius:12, padding:'10px 14px',
                        backdropFilter:'blur(8px)', transition:'all 0.3s',
                    }}>
                        <span style={{fontSize:11,fontWeight:700,color: danger ? '#dc2626' : '#059669'}}>⏱️ Timer</span>
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                            {!started && (
                                <button onClick={() => setStarted(true)} style={{
                                    background:'#059669', color:'#fff', border:'none', borderRadius:7,
                                    padding:'4px 10px', fontSize:11, fontWeight:800, cursor:'pointer',
                                }}>▶</button>
                            )}
                            <span style={{
                                fontSize:13, fontWeight:900, fontFamily:'monospace',
                                color: danger ? '#dc2626' : '#059669',
                                ...(danger && {animation:'blink 0.7s ease infinite'}),
                            }}>{fmtTime(timeLeft)}</span>
                        </div>
                    </div>
                </div>

                <Card flash={flash}>
                    {/* Progress bar */}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <span style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:2,textTransform:'uppercase'}}>Soal</span>
                        <span style={{fontSize:12,fontWeight:800,color:'#059669'}}>{idx+1} / {list.length}</span>
                    </div>
                    <div style={{height:4,background:'#f0fdf4',borderRadius:99,marginBottom:20,overflow:'hidden'}}>
                        <div style={{height:'100%',borderRadius:99,background:'linear-gradient(90deg,#10b981,#34d399)',width:`${progress}%`,transition:'width 0.4s ease'}} />
                    </div>

                    {/* Hanzi */}
                    <div style={{
                        textAlign:'center', background:'linear-gradient(135deg,#f0fdf4,#f8faff)',
                        border:'1px solid rgba(16,185,129,0.12)', borderRadius:20,
                        padding:'24px 16px', marginBottom:20,
                    }}>
                        <div style={{fontSize:80,fontWeight:900,color:'#1e1b4b',lineHeight:1}}>{cur[0]}</div>
                    </div>

                    {/* Kunci (muncul setelah jawab) */}
                    {answered[idx]?.revealed !== undefined && showResult && (
                        <div style={{
                            background:'linear-gradient(135deg,#f0fdf4,#ecfdf5)',
                            border:'1px solid #a7f3d0', borderRadius:14, padding:'12px 16px', marginBottom:14,
                            animation:'slide-up 0.3s ease',
                        }}>
                            <p style={{fontSize:10,fontWeight:800,color:'#059669',letterSpacing:2,textTransform:'uppercase',marginBottom:6}}>Kunci Jawaban</p>
                            <div style={{display:'flex',flexDirection:'column',gap:4}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span style={{fontSize:12,color:'#64748b',fontWeight:600}}>Pinyin</span>
                                    <span style={{
                                        fontSize:14, fontFamily:'monospace', fontWeight:800,
                                        color: answered[idx]?.pinyinOk ? '#059669' : '#dc2626',
                                    }}>
                                        {answered[idx]?.pinyinOk ? '✓' : '✗'} {cur[1]}
                                    </span>
                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span style={{fontSize:12,color:'#64748b',fontWeight:600}}>Arti</span>
                                    <span style={{
                                        fontSize:14, fontWeight:800,
                                        color: answered[idx]?.meaningOk ? '#059669' : '#dc2626',
                                    }}>
                                        {answered[idx]?.meaningOk ? '✓' : '✗'} {cur[2]}
                                    </span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Input */}
                    <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
                        <Input ref={inputRef} label="Pinyin (â î ô û ê = nada 3)" placeholder="contoh: hǎo atau hâo"
                            value={pinyin} disabled={showResult}
                            onChange={e => setPinyin(e.target.value)}
                            onKeyDown={e => e.key==='Enter' && !showResult && checkAnswer()} />
                        <Input label="Arti Indonesia" placeholder="contoh: baik, bagus"
                            value={meaning} disabled={showResult}
                            onChange={e => setMeaning(e.target.value)}
                            onKeyDown={e => e.key==='Enter' && !showResult && checkAnswer()} />
                    </div>

                    {/* Tombol */}
                    <div style={{display:'flex',gap:8}}>
                        {!showResult ? (
                            <Btn color="#059669" onClick={checkAnswer} full>Kirim Jawaban</Btn>
                        ) : (
                            <Btn color="#10b981" onClick={nextQ} full>
                                {idx+1 >= list.length ? '🏆 Lihat Skor' : 'Soal Berikutnya ➔'}
                            </Btn>
                        )}
                    </div>
                </Card>

                <WrongList items={wrongList} />
                </>
            );
        }

        // ══════════════════════════════════════════
        //   HARDCORE MODE
        //   - Tampil HANZI → ketik PINYIN + ARTI
        //   - 15 detik / soal, 3 nyawa, streak combo
        //   - Soal diacak ulang setiap retry
        //   - Streak ≥5 = +1 bonus poin
        // ══════════════════════════════════════════
        function HardcoreMode() {
            const [list, setList] = useState(() => shuffle(WORDS));
            const [idx, setIdx] = useState(0);
            const [timeLeft, setTimeLeft] = useState(15);
            const [lives, setLives] = useState(3);
            const [streak, setStreak] = useState(0);
            const [maxStreak, setMaxStreak] = useState(0);
            const [score, setScore] = useState(0);
            const [pinyin, setPinyin] = useState('');
            const [meaning, setMeaning] = useState('');
            const [phase, setPhase] = useState('input'); // 'input' | 'result' | 'dead'
            const [lastCorrect, setLastCorrect] = useState(null);
            const [shake, setShake] = useState(false);
            const [finished, setFinished] = useState(false);
            const [wrongList, setWrongList] = useState([]);
            const [history, setHistory] = useState([]);
            const [heartFlash, setHeartFlash] = useState(false);
            const inputRef = useRef(null);

            const cur = list[idx] || WORDS[0];
            const maxScore = list.length * 2;

            // Timer
            useEffect(() => {
                if (phase !== 'input' || finished) return;
                if (timeLeft <= 0) {
                    handleTimeout();
                    return;
                }
                const t = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(t);
            }, [phase, finished, timeLeft]);

            const handleTimeout = () => {
                // Waktu habis = salah
                const newLives = lives - 1;
                setLives(newLives);
                setStreak(0);
                setHeartFlash(true); setTimeout(() => setHeartFlash(false), 500);
                setShake(true); setTimeout(() => setShake(false), 500);
                setWrongList(p => [...p, { hanzi: cur[0], pinyin: cur[1], meaning: cur[2] }]);
                setLastCorrect({ timeout: true, pinyin: cur[1], meaning: cur[2] });
                if (newLives <= 0) {
                    setPhase('dead');
                } else {
                    setPhase('result');
                    setTimeout(() => advance(idx, score, newLives), 1500);
                }
            };

            const submit = () => {
                if (phase !== 'input') return;
                const userP = normPinyin(pinyin);
                const correctP = normPinyin(cur[1]);
                const pinyinOk = userP === correctP;
                const meaningOk = meaning.trim() !== '' && (
                    normMeaning(cur[2]).includes(normMeaning(meaning)) ||
                    normMeaning(meaning).includes(normMeaning(cur[2]))
                );
                const allOk = pinyinOk && meaningOk;

                let earned = 0;
                if (pinyinOk) earned++;
                if (meaningOk) earned++;
                // Bonus streak ≥5
                const newStreak = allOk ? streak + 1 : 0;
                if (allOk && newStreak >= 5) earned += 1; // bonus combo
                const newScore = score + earned;
                setScore(newScore);
                setStreak(newStreak);
                setMaxStreak(p => Math.max(p, newStreak));
                setLastCorrect({ pinyinOk, meaningOk, allOk, pinyin: cur[1], meaning: cur[2], streak: newStreak });

                let newLives = lives;
                if (!allOk) {
                    newLives = lives - 1;
                    setLives(newLives);
                    setShake(true); setTimeout(() => setShake(false), 500);
                    setHeartFlash(true); setTimeout(() => setHeartFlash(false), 500);
                    setWrongList(p => [...p, { hanzi: cur[0], pinyin: cur[1], meaning: cur[2] }]);
                }

                setPhase('result');
                if (newLives <= 0 && !allOk) {
                    setTimeout(() => setPhase('dead'), 1200);
                } else {
                    setTimeout(() => advance(idx, newScore, newLives), 1600);
                }
            };

            const advance = (curIdx, curScore, curLives) => {
                const nextIdx = curIdx + 1;
                if (nextIdx >= list.length || curLives <= 0) {
                    setFinished(true);
                    const finalVal = Math.round((curScore / (list.length * 2)) * 100);
                    setHistory(p => [{ nilai: finalVal, soal: nextIdx, streak: maxStreak }, ...p]);
                } else {
                    setIdx(nextIdx);
                    setTimeLeft(15);
                    setPinyin(''); setMeaning('');
                    setPhase('input');
                    setTimeout(() => inputRef.current?.focus(), 50);
                }
            };

            const retry = () => {
                const newList = shuffle(WORDS);
                setList(newList);
                setIdx(0); setTimeLeft(15); setLives(3); setStreak(0); setMaxStreak(0);
                setScore(0); setPinyin(''); setMeaning('');
                setPhase('input'); setLastCorrect(null); setShake(false);
                setFinished(false); setWrongList([]);
            };

            const timerPct = (timeLeft / 15) * 100;
            const timerDanger = timeLeft <= 5;
            const finalScore = Math.round((score / maxScore) * 100);

            if (finished || phase === 'dead') return (
                <div>
                    <Card>
                        <div style={{textAlign:'center',padding:'16px 0'}}>
                            <div style={{fontSize:52,marginBottom:8}}>{phase==='dead' && !finished ? '💔' : '💀'}</div>
                            <h2 style={{fontSize:22,fontWeight:900,color:'#1e1b4b',margin:'0 0 4px'}}>
                                {phase==='dead' && !finished ? 'NYAWA HABIS!' : 'Hardcore Selesai!'}
                            </h2>
                            <p style={{color:'#94a3b8',fontSize:12,marginBottom:20}}>
                                {phase==='dead' && !finished ? `Gugur di soal ${idx+1}` : 'Semua soal selesai'}
                            </p>
                            <div style={{background:'linear-gradient(135deg,#fff1f2,#ffe4e6)',border:'1px solid #fecaca',borderRadius:20,padding:'20px 16px',marginBottom:16}}>
                                <p style={{fontSize:10,fontWeight:800,color:'#f87171',letterSpacing:2,textTransform:'uppercase',margin:'0 0 4px'}}>Skor Akhir</p>
                                <div style={{fontSize:60,fontWeight:900,color:'#dc2626',lineHeight:1}}>{finalScore}<span style={{fontSize:20,color:'#fca5a5',fontWeight:700}}>/100</span></div>
                                <div style={{display:'flex',justifyContent:'center',gap:20,marginTop:12}}>
                                    <div style={{textAlign:'center'}}>
                                        <p style={{fontSize:10,color:'#fca5a5',fontWeight:700,margin:'0 0 2px'}}>SOAL</p>
                                        <p style={{fontSize:18,fontWeight:900,color:'#dc2626',margin:0}}>{idx}</p>
                                    </div>
                                    <div style={{textAlign:'center'}}>
                                        <p style={{fontSize:10,color:'#fca5a5',fontWeight:700,margin:'0 0 2px'}}>MAX STREAK</p>
                                        <p style={{fontSize:18,fontWeight:900,color:'#dc2626',margin:0}}>{maxStreak}🔥</p>
                                    </div>
                                </div>
                            </div>
                            <Btn color="#dc2626" onClick={retry} full>Coba Lagi 💀</Btn>
                        </div>
                    </Card>

                    {history.length > 0 && (
                        <div style={{marginTop:14}}>
                            <p style={{fontSize:11,fontWeight:800,color:'#94a3b8',letterSpacing:2,textTransform:'uppercase',textAlign:'center',marginBottom:8}}>Riwayat Hardcore</p>
                            {history.slice(0,5).map((h,i) => (
                                <div key={i} style={{
                                    display:'flex',justifyContent:'space-between',alignItems:'center',
                                    background:'rgba(255,255,255,0.65)', backdropFilter:'blur(8px)',
                                    border:'1px solid rgba(220,38,38,0.12)', borderRadius:12,
                                    padding:'10px 14px', marginBottom:6, fontSize:12, fontWeight:700,
                                }}>
                                    <span style={{color:'#94a3b8'}}>Percobaan #{history.length - i}</span>
                                    <span style={{color:'#dc2626'}}>{h.nilai}/100 · 🔥{h.streak}</span>
                                </div>
                            ))}
                        </div>
                    )}
                    <WrongList items={wrongList} color="red" />
                </div>
            );

            return (
                <div className={shake ? 'shake' : ''}>
                    {/* HUD */}
                    <div style={{
                        display:'flex', justifyContent:'space-between', alignItems:'center',
                        background:'rgba(255,255,255,0.6)', backdropFilter:'blur(10px)',
                        border:'1px solid rgba(220,38,38,0.14)', borderRadius:16,
                        padding:'10px 16px', marginBottom:12,
                    }}>
                        {/* Nyawa */}
                        <div style={{display:'flex',gap:3}}>
                            {[1,2,3].map(n => (
                                <span key={n} style={{
                                    fontSize:20,
                                    filter: n > lives ? 'grayscale(1) opacity(0.3)' : 'none',
                                    ...(heartFlash && n === lives ? {animation:'heart-pop 0.4s ease'} : {}),
                                }}>❤️</span>
                            ))}
                        </div>
                        {/* Streak */}
                        <div style={{
                            display:'flex', alignItems:'center', gap:4,
                            background: streak >= 5 ? 'linear-gradient(135deg,#fbbf24,#f59e0b)' : 'rgba(251,191,36,0.12)',
                            border: `1px solid ${streak >= 5 ? '#fbbf24' : 'rgba(251,191,36,0.2)'}`,
                            borderRadius:10, padding:'4px 10px',
                        }}>
                            <span style={{fontSize:14}}>🔥</span>
                            <span style={{fontSize:13,fontWeight:900,color: streak >= 5 ? '#fff' : '#f59e0b'}}>
                                {streak} {streak >= 5 && '· COMBO!'}
                            </span>
                        </div>
                        {/* Soal */}
                        <span style={{fontSize:12,fontWeight:800,color:'#dc2626'}}>{idx+1}/{list.length}</span>
                    </div>

                    <Card border="rgba(220,38,38,0.15)">
                        {/* Timer bar */}
                        <div style={{height:6,background:'#fee2e2',borderRadius:99,marginBottom:16,overflow:'hidden'}}>
                            <div style={{
                                height:'100%', borderRadius:99,
                                background: timerDanger
                                    ? 'linear-gradient(90deg,#ef4444,#dc2626)'
                                    : 'linear-gradient(90deg,#f87171,#ef4444)',
                                width:`${timerPct}%`, transition:'width 1s linear',
                                ...(timerDanger && {animation:'blink 0.6s ease infinite'}),
                            }} />
                        </div>

                        {/* Timer angka */}
                        <div style={{textAlign:'center',marginBottom:8}}>
                            <span style={{
                                display:'inline-block', fontSize:timerDanger ? 40 : 32, fontWeight:900,
                                color: timerDanger ? '#dc2626' : '#f87171',
                                fontFamily:'monospace', lineHeight:1,
                                ...(timerDanger && {animation:'blink 0.5s ease infinite'}),
                            }}>{timeLeft}</span>
                            <span style={{fontSize:11,color:'#fca5a5',fontWeight:700}}> detik</span>
                        </div>

                        {/* Hanzi (soal) */}
                        <div style={{
                            textAlign:'center',
                            background:'linear-gradient(135deg,#fff1f2,#fafafa)',
                            border:'1px solid rgba(220,38,38,0.1)', borderRadius:20,
                            padding:'20px 16px', marginBottom:16,
                        }}>
                            <p style={{fontSize:10,fontWeight:800,color:'#fca5a5',letterSpacing:2,textTransform:'uppercase',margin:'0 0 8px'}}>AKSARA HANZI</p>
                            <div style={{fontSize:84,fontWeight:900,color:'#1e1b4b',lineHeight:1}}>{cur[0]}</div>
                        </div>

                        {/* Hasil sebelum lanjut */}
                        {phase === 'result' && lastCorrect && !lastCorrect.timeout && (
                            <div style={{
                                background: lastCorrect.allOk ? '#f0fdf4' : '#fff1f2',
                                border: `1px solid ${lastCorrect.allOk ? '#a7f3d0' : '#fecaca'}`,
                                borderRadius:14, padding:'10px 14px', marginBottom:12,
                                animation:'slide-up 0.25s ease',
                            }}>
                                {lastCorrect.allOk
                                    ? <p style={{fontSize:14,fontWeight:900,color:'#059669',textAlign:'center',margin:0}}>
                                        ✅ Benar! {streak >= 5 && '🔥 COMBO BONUS +1!'}
                                      </p>
                                    : <div>
                                        <p style={{fontSize:12,fontWeight:800,color:'#dc2626',margin:'0 0 4px'}}>✗ Jawaban Benar:</p>
                                        <p style={{fontSize:13,fontWeight:700,color:'#1e1b4b',margin:0}}>{lastCorrect.pinyin} · {lastCorrect.meaning}</p>
                                      </div>
                                }
                            </div>
                        )}
                        {phase === 'result' && lastCorrect?.timeout && (
                            <div style={{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:14,padding:'10px 14px',marginBottom:12,animation:'slide-up 0.25s ease'}}>
                                <p style={{fontSize:12,fontWeight:800,color:'#ea580c',margin:'0 0 2px'}}>⏰ Waktu Habis!</p>
                                <p style={{fontSize:13,fontWeight:700,color:'#1e1b4b',margin:0}}>{lastCorrect.pinyin} · {lastCorrect.meaning}</p>
                            </div>
                        )}

                        {/* Input */}
                        {phase === 'input' && (
                            <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
                                <Input ref={inputRef} label="Pinyin (â î ô û ê = nada 3)" placeholder="ketik pinyin..."
                                    value={pinyin} onChange={e => setPinyin(e.target.value)}
                                    onKeyDown={e => e.key==='Enter' && submit()}
                                    accent="#dc2626" />
                                <Input label="Arti Indonesia" placeholder="ketik arti..."
                                    value={meaning} onChange={e => setMeaning(e.target.value)}
                                    onKeyDown={e => e.key==='Enter' && submit()}
                                    accent="#dc2626" />
                                <Btn color="#dc2626" onClick={submit} full>Kirim ➔</Btn>
                            </div>
                        )}
                    </Card>

                    <WrongList items={wrongList} color="red" />
                </div>
            );
        }

        // ══════════════════════════════════════════
        //   KOMPONEN BANTU
        // ══════════════════════════════════════════

        function Card({ children, flash, border }) {
            let bg = 'rgba(255,255,255,0.75)';
            if (flash === 'correct') bg = 'rgba(209,250,229,0.9)';
            if (flash === 'wrong') bg = 'rgba(254,226,226,0.9)';
            return (
                <div style={{
                    background: bg,
                    backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)',
                    border: `1px solid ${border || 'rgba(255,255,255,0.9)'}`,
                    borderRadius:24, padding:'20px 18px', marginBottom:14,
                    boxShadow:'0 4px 32px rgba(99,102,241,0.08)',
                    transition:'background 0.3s ease',
                }}>
                    {children}
                </div>
            );
        }

        const Input = React.forwardRef(function Input({ label, placeholder, value, onChange, onKeyDown, disabled, accent }, ref) {
            const color = accent || '#6366f1';
            return (
                <div>
                    <label style={{display:'block',fontSize:10,fontWeight:800,color:'#94a3b8',letterSpacing:2,textTransform:'uppercase',marginBottom:5}}>{label}</label>
                    <input ref={ref} type="text" value={value} placeholder={placeholder}
                        onChange={onChange} onKeyDown={onKeyDown} disabled={disabled}
                        style={{
                            width:'100%', boxSizing:'border-box',
                            background: disabled ? '#f8fafc' : '#fff',
                            border:`1.5px solid ${disabled ? '#e2e8f0' : '#e0e7ef'}`,
                            borderRadius:12, padding:'12px 14px', fontSize:14, fontWeight:600,
                            color:'#1e1b4b', outline:'none', fontFamily:'monospace',
                            opacity: disabled ? 0.6 : 1,
                            transition:'border 0.15s, box-shadow 0.15s',
                        }}
                        onFocus={e => { e.target.style.border=`1.5px solid ${color}`; e.target.style.boxShadow=`0 0 0 3px ${color}22`; }}
                        onBlur={e => { e.target.style.border='1.5px solid #e0e7ef'; e.target.style.boxShadow='none'; }}
                    />
                </div>
            );
        });

        function Btn({ children, onClick, color, full }) {
            return (
                <button onClick={onClick} style={{
                    width: full ? '100%' : 'auto', border:'none', cursor:'pointer',
                    background:`linear-gradient(135deg,${color},${color}cc)`,
                    color:'#fff', borderRadius:14, padding:'14px 20px',
                    fontWeight:800, fontSize:14, letterSpacing:0.3,
                    boxShadow:`0 4px 14px ${color}44`, transition:'all 0.18s',
                    display:'block',
                }}>
                    {children}
                </button>
            );
        }

        function WrongList({ items, color }) {
            if (!items || items.length === 0) return null;
            const c = color === 'red' ? '#dc2626' : '#6366f1';
            const bg = color === 'red' ? 'rgba(254,226,226,0.6)' : 'rgba(238,242,255,0.6)';
            return (
                <div style={{background:bg, backdropFilter:'blur(8px)', border:`1px solid ${c}22`, borderRadius:20, padding:'14px 16px', marginTop:4}}>
                    <p style={{fontSize:11,fontWeight:800,color:c,letterSpacing:2,textTransform:'uppercase',marginBottom:10}}>
                        ❌ Kosakata Lemah ({items.length})
                    </p>
                    <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:220,overflowY:'auto'}}>
                        {items.map((item,i) => (
                            <div key={i} style={{
                                display:'flex', justifyContent:'space-between', alignItems:'center',
                                background:'rgba(255,255,255,0.75)', backdropFilter:'blur(6px)',
                                border:'1px solid rgba(255,255,255,0.9)', borderRadius:12, padding:'10px 12px',
                            }}>
                                <div style={{display:'flex',alignItems:'center',gap:8}}>
                                    <span style={{fontSize:22,fontWeight:900,color:'#1e1b4b'}}>{item.hanzi}</span>
                                    <span style={{fontSize:11,fontFamily:'monospace',fontWeight:700,color:'#818cf8',background:'#eef2ff',border:'1px solid #e0e7ff',borderRadius:6,padding:'2px 7px'}}>{item.pinyin}</span>
                                </div>
                                <span style={{fontSize:12,fontWeight:700,color:'#64748b'}}>{item.meaning}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function FinishScreen({ score, label, color, extra, wrongList, onRetry }) {
            const emoji = score >= 80 ? '🏆' : score >= 60 ? '🎯' : '📚';
            return (
                <div>
                    <Card>
                        <div style={{textAlign:'center',padding:'16px 0'}}>
                            <div style={{fontSize:52,marginBottom:8}}>{emoji}</div>
                            <h2 style={{fontSize:22,fontWeight:900,color:'#1e1b4b',margin:'0 0 4px'}}>{label} Selesai!</h2>
                            <p style={{color:'#94a3b8',fontSize:12,marginBottom:20}}>Hasil akhir kamu</p>
                            <div style={{
                                background:`linear-gradient(135deg,${color}11,${color}08)`,
                                border:`1px solid ${color}22`, borderRadius:20,
                                padding:'20px 16px', marginBottom:16,
                            }}>
                                <p style={{fontSize:10,fontWeight:800,color,letterSpacing:2,textTransform:'uppercase',margin:'0 0 4px'}}>Skor Akhir</p>
                                <div style={{fontSize:60,fontWeight:900,color,lineHeight:1}}>
                                    {score}<span style={{fontSize:20,color:`${color}88`,fontWeight:700}}>/100</span>
                                </div>
                                {extra && <p style={{fontSize:12,color:'#94a3b8',marginTop:6,fontWeight:600}}>{extra}</p>}
                            </div>
                            <Btn color={color} onClick={onRetry} full>Ulangi Sesi Ini</Btn>
                        </div>
                    </Card>
                    <WrongList items={wrongList} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
